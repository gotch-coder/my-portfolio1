<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Works Detail</title>

  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <main>

    <!-- メイン画像 -->
    <section class="detail-mv">
      <img src="images/hotel_01.jpg" alt="〇〇旅館">
    </section>


    <!-- 詳細 -->
    <section class="detail">
      <div class="inner">

        <h1>〇〇旅館 様</h1>

        <p class="detail-text">
          温泉旅館をイメージした和風デザインで制作しました。
          落ち着いた色合いと写真を活かしたレイアウトで、
          高級感のあるサイトを意識しています。
        </p>


        <!-- 情報 -->
        <div class="detail-info">

          <dl>
            <dt>担当</dt>
            <dd>デザイン / コーディング</dd>
          </dl>

          <dl>
            <dt>使用技術</dt>
            <dd>HTML / CSS / jQuery</dd>
          </dl>

          <dl>
            <dt>制作期間</dt>
            <dd>2週間</dd>
          </dl>

        </div>


        <!-- 画像 -->
        <div class="detail-gallery">

          <img src="images/hotel_01.jpg" alt="">
          <img src="images/office_01.jpg" alt="">

        </div>


        <!-- 戻る -->
        <div class="detail-back">
          <a href="index.html">Back</a>
        </div>

      </div>
    </section>

  </main>

</body>
</html>
